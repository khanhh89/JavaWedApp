<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title th:text="${pageTitle}">Chi tiet sach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h3 mb-4" th:text="${pageTitle}">Chi tiet sach</h1>

                    <div th:if="${book != null}">
                        <dl class="row mb-4">
                            <dt class="col-sm-4">ID</dt>
                            <dd class="col-sm-8" th:text="${book.id}">1</dd>

                            <dt class="col-sm-4">Ten sach</dt>
                            <dd class="col-sm-8" th:text="${book.nameBook}">Lap trinh Java</dd>

                            <dt class="col-sm-4">Tac gia</dt>
                            <dd class="col-sm-8" th:text="${book.author}">Java</dd>

                            <dt class="col-sm-4">Gia</dt>
                            <dd class="col-sm-8" th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">50,000 VND</dd>
                        </dl>
                    </div>

                    <div th:if="${book == null}" class="alert alert-warning mb-4">
                        Khong tim thay sach theo ID duoc yeu cau.
                    </div>

                    <a th:href="@{/books}" class="btn btn-outline-secondary">Quay lai danh sach</a>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
