<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div class="container mt-4">
    <h3>Thêm món ăn mới</h3>
    <form action="/food/save" method="post" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Tên món ăn</label>
            <input type="text" class="form-control" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="imgUrl">Ảnh minh họa</label>
            <input type="file" class="form-control-file" id="imgUrl" name="imgUrl" accept="image/*" required/>
        </div>
        <button type="submit" class="btn btn-primary">Lưu món ăn</button>
    </form>

    <!-- Hiển thị thông báo -->
    <p class="mt-3 text-info" th:if="${message != null}" th:text="${message}"></p>

    <hr>
    <h3>Danh sách món ăn</h3>
    <div class="row">
        <!-- Dùng th:each để lặp qua danh sách foodList -->
        <div class="col-md-3" th:each="f : ${foodList}">
            <p th:text="${f.name}"></p>
            <!-- Dùng th:src để hiển thị ảnh -->
            <img th:src="@{${f.displayPath}}" width="150" class="img-thumbnail"/>
        </div>
    </div>
</div>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
