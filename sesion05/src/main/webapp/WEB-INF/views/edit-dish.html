<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
    <title>Chỉnh sửa món ăn</title>
</head>
<body>

<div layout:fragment="content">
<h2 class="mb-4 text-center">Chỉnh sửa thông tin món ăn</h2>

<form th:action="@{/bai3/edit}" th:object="${dish}" method="post" class="w-50 mx-auto border p-4 rounded shadow-sm">
    <div class="mb-3">
        <label class="form-label fw-bold">ID:</label>
        <input type="text" class="form-control" th:field="*{id}" readonly>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Tên món:</label>
        <input type="text" class="form-control" th:field="*{name}" required>
    </div>
    
    <div class="mb-3">
        <label class="form-label fw-bold">Giá (VND):</label>
        <input type="number" class="form-control" th:field="*{price}" required>
    </div>
    
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" th:field="*{available}">
        <label class="form-check-label fw-bold">Còn hàng</label>
    </div>
    
    <button type="submit" class="btn btn-primary px-4">Lưu</button>
    <a th:href="@{/bai3/dish-list}" class="btn btn-secondary px-4">Hủy</a>
</form>

</div>
</body>
</html>
