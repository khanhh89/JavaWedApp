<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa món</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h2 class="text-center mb-4">
        Chỉnh sửa món
    </h2>
    <div class="card">
        <div class="card-body">
            <form th:action="@{/edit-dish}" th:object="${dish}" method="post">
                <input type="hidden" th:field="*{id}">
                    <div class="mb-3">
                        <label class="form-label">Tên món</label>
                        <input type="text" class="form-control" th:field="*{name}" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Giá</label>
                        <input type="number" class="form-control" th:field="*{price}" />
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Trạng thái</label>
                        <select class="form-select" th:field="*{available}">
                            <option th:value="true">Còn hàng</option>
                            <option th:value="false">Hết hàng</option>
                        </select>
                    </div>

                    <!-- Nút -->
                    <div class="text-center">
                        <button type="submit" class="btn btn-primary me-2">Lưu</button>
                        <a href="/bai2/dishes" class="btn btn-secondary">Quay lại</a>
                    </div>

                </form>
        </div>
    </div>
</body>
</html>
