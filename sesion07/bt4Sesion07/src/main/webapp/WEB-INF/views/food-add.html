<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm món ăn</title>
</head>
<body>
<h2>Thêm món ăn mới</h2>
<div th:if="${error}" style="color:red" th:text="${error}"></div>

<form method="post" enctype="multipart/form-data" th:action="@{/food/add}" th:object="${food}">
    Tên món: <input type="text" th:field="*{name}" required/><br/><br/>
    Nhóm món:
    <select th:field="*{category}">
        <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"></option>
    </select><br/><br/>
    Giá tiền: <input type="number" step="0.01" th:field="*{price}" required/><br/><br/>
    Ảnh món: <input type="file" name="image" accept="image/*" required/><br/><br/>
    <button type="submit">Thêm món</button>
</form>
</body>
</html>
