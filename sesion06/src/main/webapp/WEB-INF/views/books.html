<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Danh sach sach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .highlight {
            background-color: #ffeeba;
            font-weight: bold;
        }
    </style>
</head>
<body class="container mt-4">
<h2 class="mb-3" th:text="${pageTitle}">Danh sach sach</h2>

<table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Ten sach</th>
        <th>Tac gia</th>
        <th>Gia</th>
        <th>Chi tiet</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}" th:classappend="${book.price} >= 50000 ? 'highlight' : ''">
        <td th:text="${book.id}">1</td>
        <td th:text="${book.nameBook}">Lap trinh Java</td>
        <td th:text="${book.author}">Java</td>
        <td th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VND'">50,000 VND</td>
        <td>
            <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-primary btn-sm">Xem chi tiet</a>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
