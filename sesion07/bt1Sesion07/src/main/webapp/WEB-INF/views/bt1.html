<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<!--
  Phần 1:
  Tên cửa hàng bị null
  Do name trong HTML là restaurantName không trùng với field name trong Java → Spring không bind được.
Checkbox active sai
 Gửi giá trị kiểu (String) không đúng kiểu boolean
 Khi không tick thì không gửi dữ liệu → Spring không nhận được giá trị.
-->
<!--Phần 2-->
<!--    html thuần-->
    <form action="/merchant/update-profile" method="POST">
      <label>Tên cửa hàng:</label>
      <input type="text" name="name" />
      <label>Số điện thoại:</label>
      <input type="text" name="phone" />
      <label>Đang mở cửa:</label>
      <input type="checkbox" name="active" value="true" />
      <button type="submit">Lưu thông tin</button>
    </form>
<!--html thymeleaf-->
<form th:action="@{/merchant/update-profile}"
      th:object="${profile}"
      method="POST">
  <label>Tên cửa hàng:</label>
  <input type="text" th:field="*{name}" />
  <label>Số điện thoại:</label>
  <input type="text" th:field="*{phone}" />
  <label>Đang mở cửa:</label>
  <input type="checkbox" th:field="*{active}" />
  <button type="submit">Lưu thông tin</button>
</form>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
